version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: infractions-mongo
    ports:
      - "27018:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

  backend:
    build: 
      context: ./backend_infractions-routieres
      dockerfile: Dockerfile
    container_name: infractions-backend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - MONGO_URL=mongodb://mongodb:27017/infractions_routieres
    depends_on:
      - mongodb
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend_infractions-routieres
      dockerfile: Dockerfile
    container_name: infractions-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongo-data:
